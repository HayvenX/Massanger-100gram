<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="sign_up.js" defer></script>
    <title>Sign up</title>
</head>
<body>
<div class="wrapper">
    <h1>Register</h1>

    <form id="form" onsubmit="event.preventDefault()">
        <input type="text" name="username" placeholder="Username" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <input type="password" name="passwordCheck" placeholder="Password Check" required>

        <button type="submit" id="formBtn">Create account</button>
    </form>

    <div class="bottom-text">
        Already have an account? <a href="/sign_in">Sign in</a>
    </div>
</div>
</body>
</html>
