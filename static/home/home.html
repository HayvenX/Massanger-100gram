<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="home.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="home.js" defer></script>
    <link rel="shortcut icon" href="https://em-content.zobj.net/source/apple/271/tumbler-glass_1f943.png">
    <title>100gram</title>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🥃 100gram</h2>
                <input type="text" placeholder="Search..." />
            </div>
            <div class="chat-list"></div>
        </aside>

        <main class="chat-area">        
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-content">
                    <div class="vodka-icon">🥃</div>
                    <h2>Welcome to 100gram</h2>
                    <p>Pick a chat to start <strong>100gramming</strong> :)</p>
                </div>
            </div>

            <div class="chat-window hidden" id="chatWindow">
                <div class="chat-header">
                    <div class="header-info">
                        <h3>Chat Name</h3>
                        <span>online</span>
                    </div>
                </div>

                <div class="messageContainer" id="messageContainer"></div>

                <div class="input-wrapper">
                    <form class="inputContainer" id="form" method="post">
                        <input id="msgInput" type="text" placeholder="Write a message..." autocomplete="off">
                        <button type="submit">
                            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
